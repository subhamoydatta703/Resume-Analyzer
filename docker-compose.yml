services:
  redis:
    image: redis:7.4-alpine
    container_name: resumark-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    image: resumark-backend:local

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production

    container_name: resumark-api
    restart: unless-stopped

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_HOST: redis
      REDIS_PORT: "6379"

    secrets:
      - backend-env

    command:
      [
        "/bin/sh",
        "-c",
        "set -a; . /run/secrets/backend-env; set +a; exec bun run dist/server.js",
      ]

    depends_on:
      redis:
        condition: service_healthy

    ports:
      - "${API_PORT:-5000}:5000"

    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: resumark-backend:local

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production

    container_name: resumark-worker
    restart: unless-stopped

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_HOST: redis
      REDIS_PORT: "6379"

    secrets:
      - backend-env

    command:
      [
        "/bin/sh",
        "-c",
        "set -a; . /run/secrets/backend-env; set +a; exec bun run dist/worker.js",
      ]

    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: resumark-frontend:local

    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      secrets:
        - frontend-env

    container_name: resumark-frontend
    restart: unless-stopped

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT:-3000}:8080"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis-data:

secrets:
  backend-env:
    file: ./backend/.env

  frontend-env:
    file: ./frontend/.env